<!doctype html>
<html lang="ar" dir="rtl" data-scheme="brown">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#1a1410"/>
  <link rel="manifest" href="./manifest.webmanifest"/>
  <link rel="icon" href="./assets/img/icon-192.png"/>
  <link rel="stylesheet" href="./assets/css/styles.css?v=0.4.1"/>
  <title>رفيق المسلم</title>
</head>
<body>
<header>
  <div class="header-wrap">
    <div class="brand"><img src="./assets/img/logo.svg" alt=""/><span>رفيق المسلم</span></div>
    <div class="toolbar" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end;">
      <div style="display: flex; gap: 8px; margin-left: 10px;">
        <button class="color-dot" data-val="white" style="background-color: #f8f9fa;" title="أبيض"></button>
        <button class="color-dot" data-val="black" style="background-color: #141414;" title="أسود"></button>
        <button class="color-dot" data-val="brown" style="background-color: #c5a059;" title="كلاسيكي ذهبي"></button>
        <button class="color-dot" data-val="gray" style="background-color: #70757a;" title="رصاصي"></button>
        <button class="color-dot" data-val="colorful" style="background: linear-gradient(45deg, #06b6d4, #8b5cf6);" title="زجاجي ملون"></button>
      </div>
      <button id="toggleTashkeel" title="إخفاء/إظهار التشكيل" class="tool-btn">بَ/ب</button>
      <button id="btnTextInc" title="تكبير الخط" class="tool-btn">A+</button>
      <button id="btnTextDec" title="تصغير الخط" class="tool-btn">A-</button>
      <button id="btnNotify" title="تفعيل التنبيهات" class="tool-btn">🔔</button>
    </div>
  </div>
</header>

<main>
  <div class="card">
    <div class="grid">
      <div class="kpi">
        <div class="label">التاريخ الهجري</div>
        <div class="value secondary" id="hijri">—</div>
        <div id="fastingReminder" class="small" style="color: var(--accent); font-weight: bold; margin-top: 6px;"></div>
      </div>
      <div class="kpi"><div class="label">الصلاة القادمة</div><div class="value"><span id="nextPrayerName">—</span> <span>(</span><span id="nextPrayerTime">—</span><span>)</span></div><div id="nextCountdown" style="direction: ltr;">—</div></div>
      <div class="kpi"><div class="label">المدينة</div><div class="value" id="cityDisplay">—</div><div class="small" id="ptMeta"></div></div>
    </div>
  </div>

  <div class="card">
    <section id="times" class="section active">
      <div class="row" id="locationControls" style="display: flex; flex-wrap: nowrap; gap: 8px;">
        <button class="btn" id="useLocation" title="تحديد موقعي التلقائي" style="padding: 0 16px; font-size: 1.4rem;">📍</button>
        <select id="citySelect" style="flex: 1;"><option value="">— اختر مدينة يدوياً —</option></select>
      </div>
      <div class="row" style="margin-top: 8px;">
        <select id="hijriAdjSelect" style="flex: 1;">
          <option value="-2">التاريخ الهجري: تقديم يومين (-٢)</option>
          <option value="-1">التاريخ الهجري: تقديم يوم (-١)</option>
          <option value="0" selected>التاريخ الهجري: دقيق (مطابق للتقويم)</option>
          <option value="1">التاريخ الهجري: تأخير يوم (+١)</option>
          <option value="2">التاريخ الهجري: تأخير يومين (+٢)</option>
        </select>
      </div>
      <div class="small" id="ptStatus" style="margin-top: 6px; text-align: center;"></div>

      <div class="table-wrap">
        <table class="table" style="margin-top:10px">
          <thead>
            <tr>
              <th style="text-align: right;">الصلاة</th>
              <th style="text-align: center;">دخول</th>
              <th style="text-align: center;">خروج</th>
            </tr>
          </thead>
          <tbody>
            <tr id="tr_Fajr"><th>الفجر</th><td id="t_fajr_s" style="text-align: center;">—</td><td id="t_fajr_e" style="text-align: center;">—</td></tr>
            <tr class="minor" id="tr_Duha"><th>الضحى</th><td id="t_duha_s" style="text-align: center;">—</td><td id="t_duha_e" style="text-align: center;">—</td></tr>
            <tr id="tr_Dhuhr"><th>الظهر</th><td id="t_dhuhr_s" style="text-align: center;">—</td><td id="t_dhuhr_e" style="text-align: center;">—</td></tr>
            <tr id="tr_Asr"><th>العصر</th><td id="t_asr_s" style="text-align: center;">—</td><td id="t_asr_e" style="text-align: center;">—</td></tr>
